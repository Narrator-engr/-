<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>录播回放 | 副本 #5732</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080808;
  --bg-card: #0e0e0e;
  --bg-card-hover: #141010;
  --accent-red: #8b0000;
  --accent-red-bright: #cc1111;
  --accent-red-dim: #8b000033;
  --accent-gold: #c4a35a;
  --accent-gold-dim: #c4a35a22;
  --accent-blue: #4a9ebb;
  --accent-blue-bright: #6ac0e0;
  --accent-blue-dim: #4a9ebb33;
  --accent-green: #2a6e3f;
  --text-primary: #ede7e0;
  --text-dim: #a89a8e;
  --text-ghost: #4a3e3e;
  --text-hidden: #080808;
  --border: #1e1a1a;
  --border-light: #2e2828;
  --font-title: 'Ma Shan Zheng', cursive;
  --font-display: 'ZCOOL QingKe HuangYou', cursive;
  --font-body: 'Noto Serif SC', serif;
  --font-mono: 'Share Tech Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

a { color: inherit; text-decoration: none; }


/* ══════════════════════════════════════
   ═══ PHASE 1: IDENTITY EXTRACTION ═══
   ══════════════════════════════════════ */

.extract-layer {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  transition: opacity 1s ease;
  overflow: hidden;
}
.extract-layer.fade-out {
  opacity: 0;
  pointer-events: none;
}

/* Optional background image */
.extract-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1.5s ease;
  filter: brightness(0.25) saturate(0.4) blur(3px);
}
.extract-bg.visible { opacity: 1; }

/* Scan lines over extraction */
.extract-layer::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    #4a9ebb04 2px, #4a9ebb04 4px
  );
  pointer-events: none;
  z-index: 2;
  animation: scanDrift 12s linear infinite;
}
@keyframes scanDrift {
  from { background-position: 0 0; }
  to { background-position: 0 100vh; }
}

.extract-content {
  position: relative;
  z-index: 10;
  text-align: center;
  max-width: 600px;
  padding: 2rem;
}

/* System prompt lines */
.ext-line {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 1.2rem;
}
.ext-line.visible {
  opacity: 1;
  transform: translateY(0);
}
.ext-line.fade-out {
  opacity: 0;
  transform: translateY(-6px);
}

.ext-system {
  font-family: var(--font-mono);
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: var(--accent-blue-bright);
  letter-spacing: 0.15em;
  text-shadow: 0 0 30px var(--accent-blue-dim), 0 0 60px var(--accent-blue-dim);
}

.ext-monologue {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text-dim);
  font-style: italic;
  letter-spacing: 0.05em;
  line-height: 1.8;
}

.ext-identity {
  font-family: var(--font-mono);
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: var(--accent-blue-bright);
  letter-spacing: 0.2em;
  text-shadow: 0 0 30px var(--accent-blue-dim), 0 0 60px var(--accent-blue-dim);
}

.ext-identity .identity-value {
  font-family: var(--font-title);
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--text-primary);
  letter-spacing: 0.3em;
  display: block;
  margin-top: 0.5rem;
  text-shadow: 0 0 40px var(--accent-blue-dim);
}

/* Glitch on identity reveal */
.ext-identity.glitch .identity-value {
  animation: idGlitch 0.12s infinite;
}
@keyframes idGlitch {
  0% { text-shadow: 2px 0 var(--accent-red-bright), -2px 0 var(--accent-blue-bright); }
  25% { text-shadow: -2px 0 var(--accent-red-bright), 2px 0 var(--accent-blue-bright); }
  50% { text-shadow: 2px 1px var(--accent-red-bright), -2px -1px var(--accent-blue-bright); }
  75% { text-shadow: -1px -1px var(--accent-red-bright), 1px 1px var(--accent-blue-bright); }
  100% { text-shadow: 1px 0 var(--accent-red-bright), -1px 0 var(--accent-blue-bright); }
}

/* Audio indicator */
.ext-audio-hint {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  margin-top: 0.5rem;
  opacity: 0;
  transition: opacity 0.4s;
}
.ext-audio-hint.visible { opacity: 1; }


/* ══════════════════════════════════════
   ═══ PHASE 2: TEXT BROADCAST ═══
   ══════════════════════════════════════ */

.broadcast-layer {
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
}
.broadcast-layer.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Status bar */
.status-bar {
  position: sticky; top: 0;
  background: #080808ee;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 100;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
}
.status-bar .back-link {
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 0.2rem 0.6rem;
  transition: all 0.3s;
}
.status-bar .back-link:hover { color: var(--accent-gold); border-color: var(--accent-gold-dim); }

/* Broadcast header */
.bcast-header {
  padding: 3rem 2rem 2rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.bcast-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center top, var(--accent-red-dim) 0%, transparent 60%);
  pointer-events: none;
}
.bcast-name {
  font-family: var(--font-title);
  font-size: clamp(2rem, 6vw, 3.5rem);
  color: var(--text-primary);
  letter-spacing: 0.25em;
  position: relative;
  text-shadow: 0 0 40px var(--accent-red-dim);
  margin-bottom: 0.3rem;
}
.bcast-identity {
  font-family: var(--font-display);
  font-size: 0.9rem;
  color: var(--accent-gold);
  letter-spacing: 0.15em;
  margin-bottom: 0.8rem;
}
.bcast-meta {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  line-height: 2;
}

/* Content area */
.bcast-content {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
  position: relative;
  z-index: 2;
}

/* Section heads */
.section-head {
  display: flex; align-items: center; gap: 1rem;
  margin: 2.5rem 0 1.5rem;
}
.section-head::before, .section-head::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.section-head h2 {
  font-family: var(--font-display);
  font-size: 0.95rem;
  color: var(--accent-gold);
  letter-spacing: 0.25em;
  white-space: nowrap;
}


/* ═══ TEXT BLOCKS WITH VERTICAL LINE ═══ */

.block-timeline {
  position: relative;
  padding: 1rem 0;
}

/* The thin connecting line */
.block-timeline::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom,
    transparent,
    var(--border) 3%,
    var(--border) 97%,
    transparent
  );
}

.text-block {
  position: relative;
  padding-left: 2.5rem;
  margin-bottom: 2rem;
  opacity: 0;
  transform: translateY(12px);
  animation: blockFadeIn 0.6s ease-out forwards;
}

@keyframes blockFadeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Small dot on the line */
.text-block::before {
  content: '';
  position: absolute;
  left: 2px;
  top: 0.65rem;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--border-light);
  border: 1px solid var(--border);
}

/* Dot color variants */
.text-block.dot-gold::before { background: var(--accent-gold); border-color: var(--accent-gold-dim); }
.text-block.dot-red::before { background: var(--accent-red-bright); border-color: var(--accent-red); animation: dotPulse 1.5s infinite; }
.text-block.dot-blue::before { background: var(--accent-blue); border-color: var(--accent-blue-dim); }
.text-block.dot-green::before { background: var(--accent-green); border-color: #2a6e3f44; }
.text-block.dot-ghost::before { background: var(--text-ghost); border-color: var(--text-ghost); }

@keyframes dotPulse { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-red-dim); } 50% { box-shadow: 0 0 8px 3px var(--accent-red-dim); } }

/* Block label (optional, small text above content) */
.block-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  letter-spacing: 0.08em;
  margin-bottom: 0.3rem;
}

/* Block content */
.block-body {
  font-size: 0.9rem;
  line-height: 2.2;
  color: var(--text-dim);
}
.block-body p { margin-bottom: 0.8rem; }
.block-body p:last-child { margin-bottom: 0; }

/* System-style block */
.text-block.style-system .block-body {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-ghost);
  border-left: 2px solid var(--border);
  padding: 0.5rem 0.8rem;
  background: #0a0a0a;
  line-height: 2;
}

/* Anomaly-style block */
.text-block.style-anomaly .block-body {
  color: var(--accent-red-bright);
  border-left: 2px solid var(--accent-red);
  padding: 0.5rem 0.8rem;
  background: #0d0808;
}

/* Dialogue-style block */
.text-block.style-dialogue .block-speaker {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--accent-gold);
  letter-spacing: 0.08em;
  margin-bottom: 0.3rem;
}

/* Block image */
.block-image {
  margin-top: 0.8rem;
  border: 1px solid var(--border);
  overflow: hidden;
}
.block-image img {
  width: 100%; display: block;
  filter: grayscale(0.3) brightness(0.85);
  transition: filter 0.4s;
}
.block-image:hover img { filter: grayscale(0) brightness(1); }
.block-image-caption {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  padding: 0.4rem 0.6rem;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
}

/* Block audio */
.block-audio {
  margin-top: 0.8rem;
}
.block-audio-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  margin-bottom: 0.3rem;
}
.block-audio audio {
  width: 100%;
  height: 36px;
  opacity: 0.7;
  filter: sepia(0.3) saturate(0.6);
}
.block-audio audio:hover { opacity: 1; }

/* Divider between blocks */
.block-divider {
  text-align: center;
  padding: 1rem 0;
  margin-left: 2.5rem;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  position: relative;
}
.block-divider::before {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 1px;
  background: var(--border);
  z-index: -1;
}
.block-divider span {
  background: var(--bg);
  padding: 0 1rem;
  position: relative;
  z-index: 1;
}


/* ══════════════════════════════════════
   ═══ FRAGMENT MODE (full-screen pieces) ═══
   ══════════════════════════════════════ */

.fragment-layer {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 400;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 2rem;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.fragment-layer.visible { opacity: 1; }
.fragment-layer.fade-out { opacity: 0; }

.frag-line {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.8s ease, transform 0.8s ease;
  margin-bottom: 1.2rem;
  max-width: 550px;
  text-align: center;
}
.frag-line.visible {
  opacity: 1;
  transform: translateY(0);
}
.frag-line.fade-out {
  opacity: 0;
  transform: translateY(-8px);
}

.frag-text {
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 2;
}

.frag-text.frag-large {
  font-family: var(--font-title);
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  color: var(--text-primary);
  letter-spacing: 0.15em;
}

.frag-text.frag-system {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-ghost);
  letter-spacing: 0.1em;
}

.frag-text.frag-red {
  color: var(--accent-red-bright);
  text-shadow: 0 0 20px var(--accent-red-dim);
}

.frag-text.frag-whisper {
  font-style: italic;
  font-size: 0.8rem;
  color: var(--text-ghost);
}

/* Signal lost ending */
.frag-end {
  margin-top: 2rem;
  text-align: center;
}
.frag-end-icon {
  font-size: 2.5rem;
  opacity: 0.15;
  margin-bottom: 1rem;
  animation: iconFlicker 4s infinite;
}
@keyframes iconFlicker {
  0%, 88%, 100% { opacity: 0.15; }
  90% { opacity: 0.3; }
  92% { opacity: 0.05; }
}
.frag-end-text {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-ghost);
  line-height: 2.2;
}
.frag-back {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  border: 1px solid var(--border);
  padding: 0.3rem 0.8rem;
  margin-top: 1.5rem;
  text-decoration: none;
  transition: all 0.3s;
  opacity: 0;
  transition: opacity 0.5s, color 0.3s, border-color 0.3s;
}
.frag-back.visible { opacity: 1; }
.frag-back:hover { color: var(--text-dim); border-color: var(--text-dim); }


/* ═══ HIDDEN TEXT SYSTEM ═══ */
.hidden-text { color: var(--text-hidden); background: transparent; transition: all 0.6s ease; position: relative; cursor: default; padding: 0 2px; text-shadow: 0 0 2px #8b000008; }
.hidden-text::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: var(--accent-red); opacity: 0; transition: opacity 0.6s; }
.hidden-text:hover { color: var(--accent-red-bright) !important; text-shadow: 0 0 20px var(--accent-red-dim); }
.hidden-text:hover::after { opacity: 0.5; }
.select-reveal { color: var(--bg); background: var(--bg); transition: none; user-select: text; }
.select-reveal::selection { background: var(--accent-red); color: white; }
.redacted { background: var(--text-dim); color: var(--text-dim); padding: 0 4px; cursor: default; user-select: none; transition: all 0.4s; }
.redacted:hover { background: var(--accent-red-dim); color: var(--accent-red-bright); }


/* ═══ FOOTER ═══ */
.page-footer {
  max-width: 720px;
  margin: 0 auto;
  text-align: center;
  padding: 2rem 1.5rem;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  border-top: 1px solid var(--border);
  margin-top: 2rem;
  line-height: 2.2;
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 600px) {
  .extract-content { padding: 1rem; }
  .bcast-header { padding: 2rem 1rem 1.5rem; }
  .bcast-content { padding: 0 1rem 2rem; }
  .text-block { padding-left: 2rem; }
}


/* ═══ CONTEXT PANELS ═══ */
.context-shell {
  margin: 1.6rem 0 2.2rem;
  display: none;
}
.context-shell.show { display: block; }
.context-topline {
  margin-bottom: 0.85rem;
  padding: 0.75rem 0.95rem;
  background: #0d0c0c;
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  line-height: 1.9;
  color: var(--text-dim);
}
.context-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 1rem;
}
.context-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 1rem 1.1rem;
}
.context-title {
  font-family: var(--font-display);
  font-size: 0.9rem;
  color: var(--accent-gold);
  letter-spacing: 0.18em;
  margin-bottom: 0.8rem;
}
.context-body {
  font-size: 0.84rem;
  line-height: 1.95;
  color: var(--text-dim);
}
.context-badges {
  margin-top: 0.85rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.context-badge {
  display: inline-block;
  padding: 0.22rem 0.6rem;
  border: 1px solid var(--border-light);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-dim);
}
.context-badge.gold {
  color: var(--accent-gold);
  border-color: var(--accent-gold-dim);
}
.context-badge.red {
  color: var(--accent-red-bright);
  border-color: var(--accent-red-dim);
}
.context-badge.blue {
  color: var(--accent-blue-bright);
  border-color: var(--accent-blue-dim);
}
.context-ops-note {
  margin-top: 1rem;
  padding: 0.95rem 1.05rem;
  border: 1px solid var(--border);
  background: #0c0c0c;
  font-size: 0.82rem;
  line-height: 1.95;
  color: var(--text-dim);
}
.context-ops-note.ops {
  border-color: var(--accent-gold-dim);
  color: #d5c19b;
  box-shadow: inset 0 0 0 1px rgba(196,163,90,0.04);
}
.context-mini {
  display: block;
  margin-top: 0.5rem;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-ghost);
  line-height: 1.8;
}


@media (max-width: 700px) {
  .context-grid { grid-template-columns: 1fr; }
}

</style>
</head>
<body>


<!-- ══════════════════════════════════════════
     PHASE 1: IDENTITY EXTRACTION (full screen)
     ══════════════════════════════════════════ -->

<div class="extract-layer" id="extractLayer">
  <div class="extract-bg" id="extractBg"></div>
  <div class="extract-content" id="extractContent">
    <!-- Lines injected by JS -->
  </div>
</div>


<!-- ══════════════════════════════════════════
     FRAGMENT MODE (full-screen text pieces, used when PAGE_MODE = "fragment")
     ══════════════════════════════════════════ -->

<div class="fragment-layer" id="fragmentLayer">
  <div id="fragmentContent"></div>
  <div class="frag-end" id="fragEnd" style="display:none">
    <div class="frag-end-icon">◌</div>
    <div class="frag-end-text" id="fragEndText">信号中断 — 录播数据不完整</div>
    <a href="qianzishu-intro.html" class="frag-back" id="fragBack">← 返回</a>
  </div>
</div>


<!-- ══════════════════════════════════════════
     PHASE 2: TEXT BROADCAST (hidden initially, used when PAGE_MODE = "full")
     ══════════════════════════════════════════ -->

<div class="broadcast-layer" id="broadcastLayer">

  <div class="status-bar">
    <a href="qianzishu-intro.html" class="back-link" id="backLink">← 返回副本简介</a>
    <span style="color:var(--accent-gold);font-size:0.6rem;">◈ 文字转播</span>
    <span style="color:var(--text-ghost);" id="barInfo">INSTANCE #5732</span>
  </div>

  <div class="bcast-header" id="bcastHeader"></div>

  <div class="bcast-content">
    <div class="context-shell" id="contextShell">
      <div class="context-topline" id="contextTopline"></div>
      <div class="context-grid">
        <div class="context-panel">
          <div class="context-title">接 入 来 源</div>

// --- Visit Tracking ---
const pageName = window.location.pathname.split('/').pop().replace('.html', '');
const VK = 'qiyang_' + pageName + '_visits';
function getVisits() { return parseInt(localStorage.getItem(VK) || '0'); }
function recordVisit() { const c = getVisits() + 1; localStorage.setItem(VK, c.toString()); return c; }
const visitCount = recordVisit();
const isReturn = visitCount > 1;

// --- Parse Markup ---
function parseMarkup(text) {
  if (!text) return '';
  return text
    .replace(/\{\{hidden:(.*?)\}\}/g, '<span class="hidden-text">$1</span>')
    .replace(/\{\{redacted:(.*?)\}\}/g, '<span class="redacted">$1</span>')
    .replace(/\{\{select:(.*?)\}\}/g, '<span class="select-reveal">$1</span>');
}

// --- Utility ---
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }




function readJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch (err) {
    return fallback;
  }
}

function saveJSON(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (err) {}
}

function isFreshTimestamp(ts, windowMs) {
  if (!ts) return false;
  const time = new Date(ts).getTime();
  if (Number.isNaN(time)) return false;
  return Date.now() - time <= windowMs;
}

function getSharedSystemState() {
  const state = readJSON(SHARED_SYSTEM_KEY, {});
  if (!Array.isArray(state.routeLog)) state.routeLog = [];
  if (!Array.isArray(state.viewedPages)) state.viewedPages = [];
  if (!Array.isArray(state.unlockedFlags)) state.unlockedFlags = [];
  return state;
}

function getRouteContext() {
  return readJSON(SHARED_ROUTE_KEY, null);
}

function getRecentRouteLogEntry(state, predicate) {
  return (state.routeLog || []).find(item => predicate(item) && isFreshTimestamp(item.timestamp, CONTEXT_WINDOW_MS)) || null;
}


function getGuestContext() {
  const shared = getSharedSystemState();
  const route = getRouteContext();
  const fromFollow = !!(route && route.guestId === GUEST_PAGE_ID && route.sourceType === 'follow-dossier' && isFreshTimestamp(route.timestamp, CONTEXT_WINDOW_MS));
  const fromArchive = !!(route && route.guestId === GUEST_PAGE_ID && route.sourceType === 'guest-archive' && isFreshTimestamp(route.timestamp, CONTEXT_WINDOW_MS));
  const fromOps = !!((fromFollow || fromArchive) && route.entryMode === 'ops');
  const textReplayEntry = getRecentRouteLogEntry(shared, item =>
    (item.sourceType === 'follow-dossier-text-replay' || item.sourceType === 'guest-archive-text-replay') &&
    item.guestId === GUEST_PAGE_ID
  );
  const watchedTextReplay = !!textReplayEntry;
  const directOpsTrace = getRecentRouteLogEntry(shared, item =>
    (item.sourceType === 'follow-dossier' || item.sourceType === 'guest-archive') &&
    item.guestId === GUEST_PAGE_ID &&
    item.entryMode === 'ops'
  );
  const directPublicTrace = getRecentRouteLogEntry(shared, item =>
    (item.sourceType === 'follow-dossier' || item.sourceType === 'guest-archive') &&
    item.guestId === GUEST_PAGE_ID &&
    item.entryMode !== 'ops'
  );
  let sourceLabel = '副本链路';
  if (fromArchive) sourceLabel = fromOps ? '运营层个人直播档案列表' : '个人直播档案列表';
  else if (fromFollow) sourceLabel = fromOps ? '运营层关注档案' : '公开层关注档案';
  else if (route && route.instanceId === 'qianzishu') sourceLabel = route.entryMode === 'ops' ? '运营层副本入口' : '公开层副本入口';
  else if (directOpsTrace) sourceLabel = '运营层残留来源';
  else if (directPublicTrace) sourceLabel = '关注档案残留来源';

  return {
    shared,
    route,
    fromFollow,
    fromArchive,
    fromOps,
    watchedTextReplay,
    textReplayEntry,
    sourceLabel,
    employeeId: route?.employeeId || shared.employeeId || 'EMP-UNKNOWN',
    visitorId: route?.visitorId || shared.visitorId || 'V-UNKNOWN',
    clearanceLabel: route?.clearanceLabel || shared.clearanceLabel || '未登记',
    contamination: typeof route?.contamination === 'number' ? route.contamination : (typeof shared.contamination === 'number' ? shared.contamination : 0),
    suspicion: typeof route?.suspicion === 'number' ? route.suspicion : (typeof shared.suspicion === 'number' ? shared.suspicion : 0),
    inheritedFlags: shared.unlockedFlags || [],
    lastRouteTime: route?.timestamp || directOpsTrace?.timestamp || directPublicTrace?.timestamp || null,
  };
}

async function runExtraction() {
  const layer = document.getElementById('extractLayer');
  const container = document.getElementById('extractContent');
  const bg = document.getElementById('extractBg');
  const audioEl = document.getElementById('extractAudio');

  for (const step of EXTRACTION_STEPS) {
    await sleep(step.delay || 500);

    // Background image
    if (step.bgImage) {
      bg.style.backgroundImage = `url('${step.bgImage}')`;
      bg.classList.add('visible');
    }

    // Audio
    if (step.audio) {
      audioEl.src = step.audio;
      audioEl.play().catch(() => {});
    }

    // Create line element
    const line = document.createElement('div');
    line.className = 'ext-line';

    if (step.type === 'system') {
      line.innerHTML = `<div class="ext-system">${step.text}</div>`;
    } else if (step.type === 'monologue') {
      line.innerHTML = `<div class="ext-monologue">${step.text}</div>`;
    } else if (step.type === 'identity') {
      const parts = step.text.split('\n');
      const prompt = parts[0] || '';
      const value = parts[1] || '';
      line.innerHTML = `<div class="ext-identity">
        ${prompt}
        <span class="identity-value">${value}</span>
      </div>`;
    }

    container.appendChild(line);

    // Trigger fade-in
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        line.classList.add('visible');
      });
    });

    // Glitch effect for identity
    if (step.type === 'identity' && step.glitch) {
      const idEl = line.querySelector('.ext-identity');
      idEl.classList.add('glitch');
      await sleep(400);
      idEl.classList.remove('glitch');
    }

    // Individual line fade-out
    if (step.duration && step.duration > 0) {
      await sleep(step.duration);
      line.classList.remove('visible');
      line.classList.add('fade-out');
    }
  }

  // Hold, then fade out entire extraction layer
  await sleep(EXTRACTION_TIMINGS.holdAfterLast);

  // Start fading out
  layer.classList.add('fade-out');

  // Only fade in broadcast layer in full mode
  if (PAGE_MODE === 'full') {
    await sleep(EXTRACTION_TIMINGS.broadcastFadeIn);
    document.getElementById('broadcastLayer').classList.add('visible');
  }

  // Wait for extraction fade to complete, then remove from DOM
  await sleep(EXTRACTION_TIMINGS.fadeOutDuration);
  layer.style.display = 'none';
  document.body.style.overflow = (PAGE_MODE === 'full') ? '' : 'hidden';
}

    `继承标记：<strong>${flagsText}</strong>`;
  if (GUEST_CONTEXT.watchedTextReplay && GUEST_CONTEXT.textReplayEntry) {
    residueHtml += `<span class="context-mini">检测到站外文本备份浏览痕迹：${new Date(GUEST_CONTEXT.textReplayEntry.timestamp).toLocaleString('zh-CN')}。系统判断你可能先读取过“文字版录播”，再回到本页。{{hidden:这会让某些被删掉的地方显得更像是被故意删掉的。}}</span>`;
  } else {
    residueHtml += `<span class="context-mini">当前未检测到站外文字备份残留。若你先从主页或个人直播档案列表的“转入文字版录播”离开，再回来，这一栏会留下痕迹。</span>`;
  }
  residue.innerHTML = parseMarkup(residueHtml);

  opsNote.className = 'context-ops-note' + (GUEST_CONTEXT.fromOps ? ' ops' : '');
  opsNote.innerHTML = parseMarkup(
    GUEST_CONTEXT.fromOps
      ? '运营层批注：当前页已继承员工后台来源。公开档案里的“参与者录播记录”只是外层说法。对这个账号而言，她更像被持续观察的对象，而不是单纯的回放文件。{{hidden:原号主并不是在追她。更像是在确认她有没有注意到自己也被追。}}'
      : '公开层提示：当前页仍以录播档案名义对外展示。若你从运营层进入，页内会额外浮现一段不对外公开的备注。'
  );
}

function renderBroadcast() {
  // Back link
  const backEl = document.getElementById('backLink');
  backEl.href = GUEST_CONTEXT.fromArchive ? GUEST_ARCHIVE_PAGE : (GUEST_CONTEXT.fromFollow ? 'index.html' : PAGE_CONFIG.backLink);
  backEl.textContent = GUEST_CONTEXT.fromArchive
    ? (GUEST_CONTEXT.fromOps ? '← 返回运营层个人档案列表' : '← 返回个人直播档案列表')
    : (GUEST_CONTEXT.fromFollow ? (GUEST_CONTEXT.fromOps ? '← 返回运营层关注列表' : '← 返回关注列表') : PAGE_CONFIG.backText);
  document.getElementById('barInfo').textContent = GUEST_CONTEXT.fromOps ? PAGE_CONFIG.barInfo + ' // OPS TRACE' : PAGE_CONFIG.barInfo;

  // Header
  const header = document.getElementById('bcastHeader');
  header.innerHTML = `
    <h1 class="bcast-name">${GUEST.name}</h1>
    <div class="bcast-identity">${GUEST.identity}</div>
    <div class="bcast-meta">${GUEST.meta}<br>${GUEST_CONTEXT.fromFollow ? ('当前来源：' + GUEST_CONTEXT.sourceLabel + ' // 员工：' + GUEST_CONTEXT.employeeId) : '当前来源：默认录播链路'}</div>
  `;

  renderContextShell();

  // Text blocks
  const timeline = document.getElementById('blockTimeline');

  TEXT_BLOCKS.forEach((block, i) => {
    // Divider
    if (block.divider) {
      const div = document.createElement('div');
      div.className = 'block-divider';
      div.innerHTML = `<span>${block.divider}</span>`;
      timeline.appendChild(div);
      return;
    }

    const el = document.createElement('div');
    const dotClass = block.dot ? ' dot-' + block.dot : '';
    const styleClass = block.style ? ' style-' + block.style : '';
    el.className = 'text-block' + dotClass + styleClass;
    el.style.animationDelay = (i * 0.08) + 's';

    let content = block.content;
    if (isReturn && block.onReturn) content = block.onReturn;

    let html = '';

    // Label
    if (block.label) {
      html += `<div class="block-label">${block.label}</div>`;
    }

    // Speaker (dialogue style)
    if (block.style === 'dialogue' && block.speaker) {
      html += `<div class="block-speaker">${block.speaker}</div>`;
    }

    // Body
    html += `<div class="block-body">${parseMarkup(content)}</div>`;

    // Image
    if (block.image) {
      html += `<div class="block-image">`;
      html += `<img src="${block.image}" alt="" loading="lazy">`;
      if (block.imageCaption) {
        html += `<div class="block-image-caption">${parseMarkup(block.imageCaption)}</div>`;
      }
      html += `</div>`;
    }

    // Audio
    if (block.audio) {
      html += `<div class="block-audio">`;
      if (block.audioLabel) {
        html += `<div class="block-audio-label">${block.audioLabel}</div>`;
      }
      html += `<audio controls preload="none"><source src="${block.audio}">浏览器不支持音频播放</audio>`;
      html += `</div>`;
    }

    el.innerHTML = html;
    timeline.appendChild(el);
  });

  // Footer hidden text
  const footer = document.getElementById('pageFooter');
  footer.innerHTML = `
    祈殃娱乐 — 副本录播系统<br>
    本记录由系统自动生成 // 部分内容因权限限制已截断<br>
    ${GUEST_CONTEXT.watchedTextReplay ? '<span style="display:block;margin-top:0.35rem;font-family:var(--font-mono);font-size:0.62rem;color:var(--accent-blue-bright)">检测到外部文字备份浏览残留 // 站外转写痕迹已写入会话记录</span>' : ''}
    <span class="hidden-text">${FOOTER_HIDDEN}</span>
  `;
}


// ══════════════════════════════════════════
// ═══ FRAGMENT MODE ENGINE ═══
// ══════════════════════════════════════════

async function runFragments() {
  const layer = document.getElementById('fragmentLayer');
  const container = document.getElementById('fragmentContent');
  const fragEnd = document.getElementById('fragEnd');

  // Show fragment layer
  layer.classList.add('visible');

  let currentLines = [];

  for (const frag of FRAGMENT_LINES) {
    await sleep(frag.delay || 1000);

    // Clear previous lines if requested
    if (frag.clearBefore) {
      currentLines.forEach(el => {
        el.classList.remove('visible');
        el.classList.add('fade-out');
      });
      await sleep(600);
      currentLines.forEach(el => el.remove());
      currentLines = [];
    }

    // Determine text
    let text = frag.text;
    if (isReturn && frag.onReturn) text = frag.onReturn;

    // Create line
    const line = document.createElement('div');
    line.className = 'frag-line';

    const styleClass = frag.style ? ' frag-' + frag.style : '';
    line.innerHTML = `<div class="frag-text${styleClass}">${parseMarkup(text)}</div>`;

    container.appendChild(line);
    currentLines.push(line);

    // Fade in
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        line.classList.add('visible');
      });
    });

    // Individual line fade-out after duration
    if (frag.duration && frag.duration > 0) {
      setTimeout(() => {
        line.classList.remove('visible');
        line.classList.add('fade-out');
      }, frag.duration);
    }
  }

  // Wait, then show ending
  await sleep(FRAGMENT_END.holdBeforeEnd || 2000);

  // Fade out remaining lines
  currentLines.forEach(el => {
    el.classList.remove('visible');
    el.classList.add('fade-out');
  });
  await sleep(800);

  // Show end block
  fragEnd.style.display = 'block';
  const endText = document.getElementById('fragEndText');
  endText.innerHTML = FRAGMENT_END.text +
    (FRAGMENT_END.hidden ? '<br>' + parseMarkup(FRAGMENT_END.hidden) : '');

  const backBtn = document.getElementById('fragBack');
  backBtn.href = FRAGMENT_END.backLink;
  backBtn.textContent = FRAGMENT_END.backText;

  // Fade in end block
  await sleep(300);
  fragEnd.style.opacity = '0';
  fragEnd.style.transition = 'opacity 0.8s ease';
  requestAnimationFrame(() => { fragEnd.style.opacity = '1'; });

  await sleep(800);
  backBtn.classList.add('visible');
}

persistGuestVisitContext();

// Prevent scroll during extraction
document.body.style.overflow = 'hidden';

if (PAGE_MODE === 'full') {
  // Pre-render broadcast content (hidden)
  renderBroadcast();
}

// Run extraction, then branch based on mode
async function main() {
  await runExtraction();

  if (PAGE_MODE === 'fragment') {
    // Keep full-screen, run fragment sequence
    await runFragments();
  }
  // "full" mode is handled inside runExtraction — it fades in broadcastLayer
}

main();
