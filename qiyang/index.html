<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祈殃娱乐 | 公告平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0a0a;
  --bg-card: #141010;
  --bg-card-hover: #1a1414;
  --accent-red: #8b0000;
  --accent-red-bright: #cc1111;
  --accent-red-dim: #8b000033;
  --accent-gold: #c4a35a;
  --accent-gold-dim: #c4a35a22;
  --text-primary: #d4ccc4;
  --text-dim: #6a5a50;
  --text-ghost: #2a2222;
  --text-hidden: #0c0a0a;
  --border: #2a1e1e;
  --border-light: #3a2e2e;
  --font-title: 'Ma Shan Zheng', cursive;
  --font-display: 'ZCOOL QingKe HuangYou', cursive;
  --font-body: 'Noto Serif SC', serif;
  --font-mono: 'Share Tech Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, #1a000044 0%, transparent 70%),
    radial-gradient(ellipse at 80% 20%, #0a000044 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

a { color: inherit; text-decoration: none; }

/* ═══ NAV BAR ═══ */
.nav {
  position: sticky; top: 0;
  background: #0c0a0aee;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 100;
}
.nav-brand { font-family: var(--font-title); font-size: 1.5rem; color: var(--accent-red-bright); letter-spacing: 0.2em; }
.nav-back { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); border: 1px solid var(--border); padding: 0.3rem 0.8rem; transition: all 0.3s; }
.nav-back:hover { color: var(--accent-gold); border-color: var(--accent-gold-dim); }
.nav-status { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); }

/* ═══ HERO ═══ */
.hero { position: relative; padding: 5rem 2rem 4rem; text-align: center; border-bottom: 1px solid var(--border); overflow: hidden; }
.hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at center top, var(--accent-red-dim) 0%, transparent 60%); pointer-events: none; }
.hero-title { font-family: var(--font-title); font-size: clamp(2.5rem, 8vw, 5rem); color: var(--accent-red-bright); text-shadow: 0 0 60px var(--accent-red-dim); letter-spacing: 0.3em; margin-bottom: 1rem; position: relative; }
.hero-slogan { font-family: var(--font-body); font-size: 1rem; color: var(--text-dim); max-width: 500px; margin: 0 auto; line-height: 2; letter-spacing: 0.1em; }
.hero-notice { margin-top: 2rem; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-ghost); padding: 0.5rem 1rem; border: 1px dashed var(--text-ghost); display: inline-block; }

/* ═══ RETURN BANNER ═══ */
.return-banner { display: none; background: linear-gradient(90deg, transparent, var(--accent-red-dim), transparent); border: 1px solid var(--accent-red-dim); padding: 1rem 2rem; margin: 1.5rem 2rem 0; text-align: center; font-family: var(--font-body); font-size: 0.85rem; color: var(--accent-red-bright); animation: returnFadeIn 2s ease-out; }
.return-banner.show { display: block; }
@keyframes returnFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ═══ CONTENT ═══ */
.content-wrapper { max-width: 800px; margin: 0 auto; padding: 2rem; position: relative; z-index: 2; }

.section-head { display: flex; align-items: center; gap: 1rem; margin: 3rem 0 1.5rem; }
.section-head::before, .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-head h2 { font-family: var(--font-display); font-size: 1.1rem; color: var(--accent-gold); letter-spacing: 0.3em; white-space: nowrap; }

/* ═══ CARDS ═══ */
.bulletin-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem 2rem; margin-bottom: 1.5rem; position: relative; transition: all 0.4s; }
.bulletin-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent-red); opacity: 0; transition: opacity 0.4s; }
.bulletin-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
.bulletin-card:hover::before { opacity: 1; }
.card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.8rem; }
.card-title { font-family: var(--font-display); font-size: 1.05rem; color: var(--text-primary); letter-spacing: 0.1em; }
.card-date { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); }
.card-body { font-size: 0.9rem; line-height: 2; color: var(--text-dim); }
.card-tag { display: inline-block; font-family: var(--font-mono); font-size: 0.6rem; padding: 0.2rem 0.6rem; margin-top: 0.8rem; border: 1px solid var(--border); color: var(--text-dim); }
.card-tag.tag-urgent { border-color: var(--accent-red-dim); color: var(--accent-red-bright); }
.card-tag.tag-secret { border-color: var(--accent-gold-dim); color: var(--accent-gold); }

/* ═══ CLICKABLE CARDS ═══ */
a.card-linked { display: block; text-decoration: none; color: inherit; cursor: pointer; }
a.card-linked:hover { border-color: var(--accent-gold); box-shadow: 0 0 20px var(--accent-gold-dim); }
a.card-linked:hover .card-title { color: var(--accent-gold); }

/* ═══ HIDDEN TEXT ═══ */
.hidden-text { color: var(--text-hidden); background: transparent; transition: all 0.6s ease; position: relative; cursor: default; padding: 0 2px; text-shadow: 0 0 2px #8b000008; }
.hidden-text::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: var(--accent-red); opacity: 0; transition: opacity 0.6s; }
.hidden-text:hover { color: var(--accent-red-bright) !important; text-shadow: 0 0 20px var(--accent-red-dim); }
.hidden-text:hover::after { opacity: 0.5; }

.select-reveal { color: var(--bg); background: var(--bg); transition: none; user-select: text; }
.select-reveal::selection { background: var(--accent-red); color: white; }

.redacted { background: var(--text-dim); color: var(--text-dim); padding: 0 4px; cursor: default; user-select: none; transition: all 0.4s; }
.redacted:hover { background: var(--accent-red-dim); color: var(--accent-red-bright); }

/* ═══ VISIT COUNTER ═══ */
.visit-counter { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-ghost); text-align: center; padding: 1rem; border-top: 1px solid var(--border); margin-top: 3rem; }

/* ═══ FOOTER ═══ */
.site-footer { text-align: center; padding: 3rem 2rem; font-size: 0.75rem; color: var(--text-ghost); line-height: 2.2; border-top: 1px solid var(--border); margin-top: 2rem; }
.site-footer .hidden-text { font-size: 0.7rem; }

/* ═══ TIME NOTICE ═══ */
.time-notice { display: none; background: #0a0808; border: 1px solid var(--accent-gold-dim); padding: 1rem 1.5rem; margin: 1.5rem 0; font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent-gold); text-align: center; animation: gentlePulse 4s infinite; }
.time-notice.show { display: block; }
@keyframes gentlePulse { 0%, 100% { border-color: var(--accent-gold-dim); } 50% { border-color: var(--accent-gold); } }

/* ═══ ANIMATIONS ═══ */
.fade-in { opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease-out forwards; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.fade-in:nth-child(1) { animation-delay: 0.1s; }
.fade-in:nth-child(2) { animation-delay: 0.2s; }
.fade-in:nth-child(3) { animation-delay: 0.3s; }
.fade-in:nth-child(4) { animation-delay: 0.4s; }
.fade-in:nth-child(5) { animation-delay: 0.5s; }

.visit-variation { display: none; }
.visit-variation.show { display: inline; }
.first-visit-only { display: inline; }
.first-visit-only.hide { display: none; }


/* ══════════════════════════════════════
   ═══ SEARCH BOX ═══
   ══════════════════════════════════════ */
.search-section { margin: 2rem 0; }

.search-box {
  display: flex; gap: 0;
  border: 1px solid var(--border);
  background: var(--bg-card);
  transition: border-color 0.4s;
}
.search-box:focus-within { border-color: var(--accent-red-dim); }

.search-box input {
  flex: 1; background: transparent; border: none;
  padding: 0.8rem 1.2rem; color: var(--text-primary);
  font-family: var(--font-body); font-size: 0.9rem; outline: none;
}
.search-box input::placeholder { color: var(--text-ghost); font-style: italic; }

.search-box button {
  background: var(--accent-red); border: none;
  padding: 0.8rem 1.5rem; color: var(--text-primary);
  font-family: var(--font-display); font-size: 0.85rem;
  letter-spacing: 0.15em; cursor: pointer; transition: all 0.3s;
}
.search-box button:hover { background: var(--accent-red-bright); }

.search-result {
  margin-top: 1rem; overflow: hidden;
  max-height: 0; opacity: 0;
  transition: max-height 0.6s ease, opacity 0.6s ease;
}
.search-result.show { max-height: 600px; opacity: 1; }

.search-result-inner {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 1.2rem 1.5rem; font-size: 0.85rem;
  line-height: 2; color: var(--text-dim); position: relative;
}
.search-result-inner::before {
  content: '◈ 查询结果'; display: block;
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--text-ghost); margin-bottom: 0.8rem;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}

.typing-cursor::after { content: '█'; animation: cursorBlink 0.8s infinite; color: var(--accent-red); font-size: 0.8em; }
@keyframes cursorBlink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

.result-glitch { animation: resultGlitch 0.15s infinite; }
@keyframes resultGlitch { 0% { transform: translate(0); } 25% { transform: translate(-2px, 1px); } 50% { transform: translate(1px, -1px); } 75% { transform: translate(-1px, -1px); } 100% { transform: translate(0); } }


/* ══════════════════════════════════════
   ═══ EMPLOYEE LOGIN ═══
   ══════════════════════════════════════ */
.login-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px dashed var(--border); }
.login-header { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-ghost); text-align: center; margin-bottom: 1rem; letter-spacing: 0.1em; }

.login-box {
  display: flex; gap: 0;
  border: 1px solid var(--border);
  background: var(--bg-card);
  max-width: 400px; margin: 0 auto;
  transition: border-color 0.4s;
}
.login-box:focus-within { border-color: var(--accent-gold-dim); }

.login-box input {
  flex: 1; background: transparent; border: none;
  padding: 0.7rem 1rem; color: var(--text-primary);
  font-family: var(--font-mono); font-size: 0.8rem;
  outline: none; letter-spacing: 0.15em;
}
.login-box input::placeholder { color: var(--text-ghost); letter-spacing: 0.1em; }

.login-box button {
  background: transparent; border: none;
  border-left: 1px solid var(--border);
  padding: 0.7rem 1.2rem; color: var(--text-dim);
  font-family: var(--font-mono); font-size: 0.7rem;
  cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em;
}
.login-box button:hover { color: var(--accent-gold); background: #ffffff05; }

.login-result {
  max-width: 400px; margin: 0.8rem auto 0;
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.6s ease, opacity 0.6s ease;
}
.login-result.show { max-height: 500px; opacity: 1; }

.login-result-inner {
  background: #0a0808; border: 1px solid var(--border);
  padding: 1rem 1.2rem; font-family: var(--font-mono);
  font-size: 0.75rem; line-height: 2;
  color: var(--text-dim); text-align: center;
}
.login-denied { color: var(--accent-red-bright); }
.login-granted { color: var(--accent-gold); }

.login-attempts { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-ghost); text-align: center; margin-top: 0.5rem; }

@keyframes screenShake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); } 20%, 40%, 60%, 80% { transform: translateX(3px); } }
.shake { animation: screenShake 0.4s ease-out; }

.screen-flash { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--accent-red); z-index: 9998; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
.screen-flash.active { opacity: 0.15; transition: opacity 0s; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 600px) {
  .content-wrapper { padding: 1rem; }
  .bulletin-card { padding: 1rem 1.2rem; }
  .hero { padding: 3rem 1rem 2rem; }
  .card-header { flex-direction: column; gap: 0.3rem; }
  .search-box { flex-direction: column; }
  .search-box button { border-top: 1px solid var(--border); }
}
</style>
</head>

// --- Visit Tracking ---
const VISIT_KEY = 'qiyang_visits';
const FIRST_VISIT_KEY = 'qiyang_first_visit';
function getVisitCount() { return parseInt(localStorage.getItem(VISIT_KEY) || '0'); }
function recordVisit() {
  const count = getVisitCount() + 1;
  localStorage.setItem(VISIT_KEY, count.toString());
  if (!localStorage.getItem(FIRST_VISIT_KEY)) localStorage.setItem(FIRST_VISIT_KEY, new Date().toISOString());
  return count;
}
const visitCount = recordVisit();
const isReturn = visitCount > 1;

// --- Visitor ID ---
function genVisitorId() {
  let id = localStorage.getItem('qiyang_vid');
  if (!id) { id = 'V-' + Math.random().toString(36).substr(2, 8).toUpperCase(); localStorage.setItem('qiyang_vid', id); }
  return id;
}
document.getElementById('visitorId').textContent = genVisitorId();

// --- Parse Markup ---
function parseMarkup(text) {
  return text
    .replace(/\{\{hidden:(.*?)\}\}/g, '<span class="hidden-text">$1</span>')
    .replace(/\{\{redacted:(.*?)\}\}/g, '<span class="redacted">$1</span>')
    .replace(/\{\{select:(.*?)\}\}/g, '<span class="select-reveal">$1</span>');
}

// --- Render Cards ---
function renderCards(data, containerId, showReturnVariant) {
  const container = document.getElementById(containerId);
  data.forEach((item, i) => {
    let card;
    if (item.link) {
      card = document.createElement('a');
      card.href = item.link;
      card.className = 'bulletin-card fade-in card-linked';
    } else {
      card = document.createElement('div');
      card.className = 'bulletin-card fade-in';
    }
    card.style.animationDelay = (i * 0.15) + 's';
    let bodyContent = (showReturnVariant && item.onReturn) ? item.onReturn : item.body;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${item.title}${item.link ? ' <span style="font-size:0.6rem;opacity:0.4">▸ 进入</span>' : ''}</div>
        <div class="card-date">${item.date}</div>
      </div>
      <div class="card-body">${parseMarkup(bodyContent)}</div>
      <span class="card-tag tag-${item.tagType}">${item.tag}</span>
    `;
    container.appendChild(card);
  });
}

// ═══ SEARCH ENGINE ═══
// ══════════════════════════════════════════

const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchResult = document.getElementById('searchResult');
const searchResultInner = document.getElementById('searchResultInner');

function triggerScreenFlash() {
  const flash = document.getElementById('screenFlash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);
  setTimeout(() => { flash.classList.add('active'); setTimeout(() => flash.classList.remove('active'), 100); }, 300);
}

function typewriterEffect(element, html, speed) {
  speed = speed || 30;
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = html;
  const plainText = tempDiv.textContent;
  element.innerHTML = '<span class="typing-cursor"></span>';
  let i = 0;
  const interval = setInterval(() => {
    if (i < plainText.length) {
      element.innerHTML = plainText.substring(0, i + 1) + '<span class="typing-cursor"></span>';
      i++;
    } else {
      clearInterval(interval);
      setTimeout(() => { element.innerHTML = html; }, 500);
    }
  }, speed);
}

function doSearch() {
  const query = searchInput.value.trim();
  if (!query) return;

  let matched = null;
  for (const trigger of SEARCH_TRIGGERS) {
    if (trigger.keywords.some(kw => query.includes(kw))) { matched = trigger; break; }
  }

  let responseHTML, effect = 'normal';
  if (matched) {
    responseHTML = parseMarkup(matched.response);
    effect = matched.effect || 'normal';
  } else {
    responseHTML = parseMarkup(SEARCH_FALLBACKS[Math.floor(Math.random() * SEARCH_FALLBACKS.length)]);
  }

  searchResultInner.className = 'search-result-inner';
  if (effect === 'flash') triggerScreenFlash();
  if (effect === 'glitch') { searchResultInner.classList.add('result-glitch'); setTimeout(() => searchResultInner.classList.remove('result-glitch'), 2000); }
  if (effect === 'delayed') { typewriterEffect(searchResultInner, responseHTML); } else { searchResultInner.innerHTML = responseHTML; }

  searchResult.classList.add('show');

  // 记录搜索历史
  const searches = JSON.parse(localStorage.getItem('qiyang_searches') || '[]');
  searches.push({ query, time: new Date().toISOString() });
  localStorage.setItem('qiyang_searches', JSON.stringify(searches));
}

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ═══ PASSWORD / LOGIN ENGINE ═══
// ══════════════════════════════════════════

const loginInput = document.getElementById('loginInput');
const loginBtn = document.getElementById('loginBtn');
const loginResult = document.getElementById('loginResult');
const loginResultInner = document.getElementById('loginResultInner');
const loginAttemptsEl = document.getElementById('loginAttempts');

let loginAttemptCount = parseInt(localStorage.getItem('qiyang_login_attempts') || '0');

function updateAttemptDisplay() {
  if (loginAttemptCount > 0) loginAttemptsEl.textContent = `累计尝试: ${loginAttemptCount} 次`;
}
updateAttemptDisplay();

function doLogin() {
  const input = loginInput.value.trim();
  if (!input) return;

  loginAttemptCount++;
  localStorage.setItem('qiyang_login_attempts', loginAttemptCount.toString());
  updateAttemptDisplay();

  let matched = null;
  for (const trigger of PASSWORD_TRIGGERS) {
    if (trigger.passwords.includes(input)) { matched = trigger; break; }
  }

  let responseHTML, resultType = 'denied';
  if (matched) {
    responseHTML = parseMarkup(matched.response);
    resultType = matched.type || 'denied';
  } else {
    const idx = Math.min(loginAttemptCount - 1, PASSWORD_FALLBACKS.length - 1);
    responseHTML = parseMarkup(PASSWORD_FALLBACKS[idx]);
  }

  loginResultInner.className = 'login-result-inner';
  if (resultType === 'granted' || resultType === 'special') { loginResultInner.classList.add('login-granted'); }
  else { loginResultInner.classList.add('login-denied'); }
  if (resultType === 'warning') { document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 400); }
  if (resultType === 'special') { triggerScreenFlash(); loginResultInner.classList.add('login-granted'); }

  loginResultInner.innerHTML = responseHTML;
  loginResult.classList.add('show');
  loginInput.value = '';
}

loginBtn.addEventListener('click', doLogin);
loginInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
