<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祈殃娱乐 | 公告平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0a0a;
  --bg-card: #141010;
  --bg-card-hover: #1a1414;
  --accent-red: #8b0000;
  --accent-red-bright: #cc1111;
  --accent-red-dim: #8b000033;
  --accent-gold: #c4a35a;
  --accent-gold-dim: #c4a35a22;
  --text-primary: #d4ccc4;
  --text-dim: #6a5a50;
  --text-ghost: #2a2222;
  --text-hidden: #0c0a0a; /* same as bg — invisible until hover */
  --border: #2a1e1e;
  --border-light: #3a2e2e;
  --font-title: 'Ma Shan Zheng', cursive;
  --font-display: 'ZCOOL QingKe HuangYou', cursive;
  --font-body: 'Noto Serif SC', serif;
  --font-mono: 'Share Tech Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ TEXTURE OVERLAY ═══ */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, #1a000044 0%, transparent 70%),
    radial-gradient(ellipse at 80% 20%, #0a000044 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

/* Subtle noise */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

a { color: inherit; text-decoration: none; }

/* ═══ NAV BAR ═══ */
.nav {
  position: sticky;
  top: 0;
  background: #0c0a0aee;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}

.nav-brand {
  font-family: var(--font-title);
  font-size: 1.5rem;
  color: var(--accent-red-bright);
  letter-spacing: 0.2em;
}

.nav-back {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 0.3rem 0.8rem;
  transition: all 0.3s;
}
.nav-back:hover {
  color: var(--accent-gold);
  border-color: var(--accent-gold-dim);
}

.nav-status {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
}

/* ═══ HERO BANNER ═══ */
.hero {
  position: relative;
  padding: 5rem 2rem 4rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center top, var(--accent-red-dim) 0%, transparent 60%);
  pointer-events: none;
}

.hero-title {
  font-family: var(--font-title);
  font-size: clamp(2.5rem, 8vw, 5rem);
  color: var(--accent-red-bright);
  text-shadow: 0 0 60px var(--accent-red-dim);
  letter-spacing: 0.3em;
  margin-bottom: 1rem;
  position: relative;
}

.hero-slogan {
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--text-dim);
  max-width: 500px;
  margin: 0 auto;
  line-height: 2;
  letter-spacing: 0.1em;
}

.hero-notice {
  margin-top: 2rem;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-ghost);
  padding: 0.5rem 1rem;
  border: 1px dashed var(--text-ghost);
  display: inline-block;
}

/* ═══ SECOND VISIT BANNER ═══ */
.return-banner {
  display: none;
  background: linear-gradient(90deg, transparent, var(--accent-red-dim), transparent);
  border: 1px solid var(--accent-red-dim);
  padding: 1rem 2rem;
  margin: 1.5rem 2rem 0;
  text-align: center;
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--accent-red-bright);
  animation: returnFadeIn 2s ease-out;
}
.return-banner.show { display: block; }

@keyframes returnFadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══ CONTENT AREA ═══ */
.content-wrapper {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem;
  position: relative;
  z-index: 2;
}

/* ═══ SECTION HEADING ═══ */
.section-head {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 3rem 0 1.5rem;
}
.section-head::before,
.section-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.section-head h2 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--accent-gold);
  letter-spacing: 0.3em;
  white-space: nowrap;
}

/* ═══ BULLETIN CARDS ═══ */
.bulletin-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 1.5rem 2rem;
  margin-bottom: 1.5rem;
  position: relative;
  transition: all 0.4s;
}

.bulletin-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent-red);
  opacity: 0;
  transition: opacity 0.4s;
}

.bulletin-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-light);
}
.bulletin-card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.8rem;
}

.card-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  color: var(--text-primary);
  letter-spacing: 0.1em;
}

.card-date {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
}

.card-body {
  font-size: 0.9rem;
  line-height: 2;
  color: var(--text-dim);
}

.card-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.2rem 0.6rem;
  margin-top: 0.8rem;
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.card-tag.tag-urgent {
  border-color: var(--accent-red-dim);
  color: var(--accent-red-bright);
}

.card-tag.tag-secret {
  border-color: var(--accent-gold-dim);
  color: var(--accent-gold);
}

/* ═══════════════════════════════ */
/* ═══ CORE: HIDDEN TEXT SYSTEM ═══ */
/* ═══════════════════════════════ */

/*
 * 隐藏文字的使用方法：
 * 在任何文本中加入 <span class="hidden-text">隐藏内容</span>
 * 文字默认与背景同色不可见
 * 鼠标悬停时会以红色高亮显示
 * 还有微妙的"气息"效果提示这里有东西
 */
.hidden-text {
  color: var(--text-hidden);
  background: transparent;
  transition: all 0.6s ease;
  position: relative;
  cursor: default;
  padding: 0 2px;
  /* 极微弱的提示——仔细看能发现一点点不同 */
  text-shadow: 0 0 2px #8b000008;
}

.hidden-text::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 1px;
  background: var(--accent-red);
  opacity: 0;
  transition: opacity 0.6s;
}

.hidden-text:hover {
  color: var(--accent-red-bright) !important;
  text-shadow: 0 0 20px var(--accent-red-dim);
}

.hidden-text:hover::after {
  opacity: 0.5;
}

/* 另一种隐藏：需要选中（拖动高亮）才能看到的文字 */
.select-reveal {
  color: var(--bg);
  background: var(--bg);
  transition: none;
  user-select: text;
}
.select-reveal::selection {
  background: var(--accent-red);
  color: white;
}

/* ═══ VISIT COUNT DISPLAY ═══ */
.visit-counter {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  text-align: center;
  padding: 1rem;
  border-top: 1px solid var(--border);
  margin-top: 3rem;
}

/* ═══ FOOTER ═══ */
.footer {
  text-align: center;
  padding: 3rem 2rem;
  font-size: 0.75rem;
  color: var(--text-ghost);
  line-height: 2.2;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}

.footer .hidden-text {
  font-size: 0.7rem;
}

/* ═══ SPECIAL: REDACTED TEXT ═══ */
.redacted {
  background: var(--text-dim);
  color: var(--text-dim);
  padding: 0 4px;
  cursor: default;
  user-select: none;
  transition: all 0.4s;
}
.redacted:hover {
  background: var(--accent-red-dim);
  color: var(--accent-red-bright);
}

/* ═══ TIME-SENSITIVE NOTICE ═══ */
.time-notice {
  display: none;
  background: #0a0808;
  border: 1px solid var(--accent-gold-dim);
  padding: 1rem 1.5rem;
  margin: 1.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent-gold);
  text-align: center;
  animation: gentlePulse 4s infinite;
}
.time-notice.show { display: block; }

@keyframes gentlePulse {
  0%, 100% { border-color: var(--accent-gold-dim); }
  50% { border-color: var(--accent-gold); }
}

/* ═══ ANIMATIONS ═══ */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s ease-out forwards;
}
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.fade-in:nth-child(1) { animation-delay: 0.1s; }
.fade-in:nth-child(2) { animation-delay: 0.2s; }
.fade-in:nth-child(3) { animation-delay: 0.3s; }
.fade-in:nth-child(4) { animation-delay: 0.4s; }
.fade-in:nth-child(5) { animation-delay: 0.5s; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 600px) {
  .content-wrapper { padding: 1rem; }
  .bulletin-card { padding: 1rem 1.2rem; }
  .hero { padding: 3rem 1rem 2rem; }
  .card-header { flex-direction: column; gap: 0.3rem; }
}

/* ═══ SECOND-VISIT VARIATIONS ═══ */
.visit-variation { display: none; }
.visit-variation.show { display: inline; }
.first-visit-only { display: inline; }
.first-visit-only.hide { display: none; }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="../index.html" class="nav-back">← 返回交界面</a>
  <div class="nav-brand">祈殃娱乐</div>
  <div class="nav-status">
    访问编号: <span id="visitorId">----</span>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1 class="hero-title">祈殃娱乐</h1>
  <p class="hero-slogan">
    「为您甄选最优质的灵异体验副本」<br>
    <span class="first-visit-only" data-visit="first">安全・可控・满意率 99.7%</span>
    <span class="visit-variation" data-visit="return">安全・可控・<span class="hidden-text">存活</span>率 99.7%</span>
  </p>
  <div class="hero-notice">
    本平台内容仅面向已签署免责协议之用户 // 未授权访问已被记录
  </div>
</div>

<!-- RETURN VISITOR BANNER -->
<div class="return-banner" id="returnBanner">
  ⚠ 系统检测到您曾访问过本平台。部分内容已根据您的<span class="redacted">风险等级</span>进行调整。
</div>

<!-- TIME-SENSITIVE NOTICE -->
<div class="time-notice" id="timeNotice"></div>

<!-- MAIN CONTENT -->
<div class="content-wrapper">

  <!-- SECTION: 公告 -->
  <div class="section-head">
    <h2>公 告</h2>
  </div>

  <div id="bulletinContainer">
    <!-- Cards are injected from JSON data -->
  </div>

  <!-- SECTION: 副本列表 -->
  <div class="section-head">
    <h2>副 本 一 览</h2>
  </div>

  <div id="instanceContainer">
    <!-- Injected from data -->
  </div>

  <!-- VISIT COUNTER -->
  <div class="visit-counter" id="visitCounter"></div>

</div>

<!-- FOOTER -->
<footer class="footer">
  祈殃娱乐 — 隶属于 ████ 集团<br>
  本平台发布之所有信息均为事实 <span class="hidden-text">（以上为要求公开的声明）</span><br>
  <span style="opacity:0.2">如果你能看到这行字，说明你还是你。</span>
</footer>

<script>
// ══════════════════════════════════════════
// CONTENT DATA — 你只需要修改这里来添加新内容！
// ══════════════════════════════════════════

/*
 * ████████████████████████████████████████
 * ██                                    ██
 * ██  内 容 管 理 指 南                   ██
 * ██                                    ██
 * ██  添加新公告：                        ██
 * ██  在 BULLETINS 数组开头加一个对象      ██
 * ██                                    ██
 * ██  添加新副本：                        ██
 * ██  在 INSTANCES 数组里加一个对象        ██
 * ██                                    ██
 * ██  特殊标记语法：                      ██
 * ██  {{hidden:文字}}  → 鼠标悬停显示     ██
 * ██  {{redacted:文字}} → 涂黑遮挡        ██
 * ██  {{select:文字}}  → 需选中才能看     ██
 * ██                                    ██
 * ██  tag类型: normal / urgent / secret  ██
 * ██                                    ██
 * ██  onReturn: 设为字符串，              ██
 * ██  二次访问时会替换原body内容           ██
 * ██                                    ██
 * ████████████████████████████████████████
 */

const BULLETINS = [
  {
    title: "关于近期副本异常的说明",
    date: "公告编号 QY-2024-0312",
    body: "近期有用户反映在「镜中回廊」副本中遭遇了超出预期的体验。经核实，该副本所有指标均在安全范围内。{{hidden:第七层走廊尽头的门不属于原始设计。请勿开启。}}请各位用户放心继续参与。",
    tag: "官方公告",
    tagType: "normal",
    onReturn: "近期有用户反映在「镜中回廊」副本中遭遇了超出预期的体验。经核实，该副本{{hidden:已无法}}正常运行。{{hidden:我们失去了三名员工。}}请各位用户暂停参与该副本。"
  },
  {
    title: "新副本上线预告",
    date: "公告编号 QY-2024-0287",
    body: "「深海旅馆」副本将于下月正式开放。本副本主打沉浸式深海探索体验，恐惧指数：★★★☆☆。{{hidden:实际恐惧指数已在内部测试中突破量表上限。}}欢迎提前预约。",
    tag: "新副本",
    tagType: "normal"
  },
  {
    title: "⚠ 紧急通知",
    date: "公告编号 QY-2024-0301",
    body: "请所有用户立即停止尝试与副本内NPC进行\"超出剧本范围的对话\"。{{hidden:他们已经开始回答了。}}此类行为可能导致系统不稳定，违者将被{{redacted:永久移除}}暂停使用资格。",
    tag: "紧急",
    tagType: "urgent",
    onReturn: "请所有用户立即停止尝试与副本内NPC进行\"超出剧本范围的对话\"。{{hidden:他们不是NPC。}}此类行为{{hidden:正是它们等待的触发条件}}可能导致系统不稳定。——此条公告已被{{redacted:它们}}管理层要求修改措辞。"
  },
  {
    title: "用户满意度调查结果公示",
    date: "公告编号 QY-2024-0256",
    body: "本季度用户满意度达到 98.3%，续约率 97.1%。感谢各位的信任与支持。{{select:剩余1.7%的用户目前处于失联状态。}}{{hidden:请不要去找他们。}}",
    tag: "数据公示",
    tagType: "normal"
  }
];

const INSTANCES = [
  {
    title: "镜中回廊",
    date: "副本编号 #001",
    body: "类型：密室逃脱 | 恐惧指数：★★★☆☆<br>简介：在无限延伸的镜面走廊中寻找出口。{{hidden:没有出口。所有镜子里的人都是以前的参与者。}}建议体验时长：120分钟。",
    tag: "经典副本",
    tagType: "normal"
  },
  {
    title: "深海旅馆",
    date: "副本编号 #002",
    body: "类型：探索解谜 | 恐惧指数：★★★☆☆<br>简介：位于海底3000米的豪华旅馆，探索每一间客房的秘密。{{hidden:退房时间是永远。}}即将开放，敬请期待。",
    tag: "即将上线",
    tagType: "secret"
  },
  {
    title: "█████",
    date: "副本编号 #???",
    body: "类型：{{redacted:已删除}} | 恐惧指数：<span style='color:var(--accent-red-bright)'>数据溢出</span><br>简介：{{redacted:该副本从未存在。}}{{hidden:它一直在运行。你现在就在里面。}}",
    tag: "???",
    tagType: "urgent"
  }
];


// ══════════════════════════════════════════
// ENGINE — 以下为渲染引擎，无需修改
// ══════════════════════════════════════════

// --- Visit Tracking ---
const VISIT_KEY = 'qiyang_visits';
const FIRST_VISIT_KEY = 'qiyang_first_visit';

function getVisitCount() {
  return parseInt(localStorage.getItem(VISIT_KEY) || '0');
}

function recordVisit() {
  const count = getVisitCount() + 1;
  localStorage.setItem(VISIT_KEY, count.toString());
  if (!localStorage.getItem(FIRST_VISIT_KEY)) {
    localStorage.setItem(FIRST_VISIT_KEY, new Date().toISOString());
  }
  return count;
}

const visitCount = recordVisit();
const isReturn = visitCount > 1;

// --- Visitor ID ---
function genVisitorId() {
  let id = localStorage.getItem('qiyang_vid');
  if (!id) {
    id = 'V-' + Math.random().toString(36).substr(2, 8).toUpperCase();
    localStorage.setItem('qiyang_vid', id);
  }
  return id;
}
document.getElementById('visitorId').textContent = genVisitorId();

// --- Parse Special Markup ---
function parseMarkup(text) {
  return text
    .replace(/\{\{hidden:(.*?)\}\}/g, '<span class="hidden-text">$1</span>')
    .replace(/\{\{redacted:(.*?)\}\}/g, '<span class="redacted">$1</span>')
    .replace(/\{\{select:(.*?)\}\}/g, '<span class="select-reveal">$1</span>');
}

// --- Render Cards ---
function renderCards(data, containerId, showReturnVariant) {
  const container = document.getElementById(containerId);
  data.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'bulletin-card fade-in';
    card.style.animationDelay = (i * 0.15) + 's';

    let bodyContent = item.body;
    if (showReturnVariant && item.onReturn) {
      bodyContent = item.onReturn;
    }

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${item.title}</div>
        <div class="card-date">${item.date}</div>
      </div>
      <div class="card-body">${parseMarkup(bodyContent)}</div>
      <span class="card-tag tag-${item.tagType}">${item.tag}</span>
    `;
    container.appendChild(card);
  });
}

renderCards(BULLETINS, 'bulletinContainer', isReturn);
renderCards(INSTANCES, 'instanceContainer', false);

// --- Return Visit UI ---
if (isReturn) {
  document.getElementById('returnBanner').classList.add('show');

  // Toggle first-visit / return-visit text
  document.querySelectorAll('.first-visit-only').forEach(el => el.classList.add('hide'));
  document.querySelectorAll('.visit-variation').forEach(el => el.classList.add('show'));
}

// --- Visit Counter ---
document.getElementById('visitCounter').innerHTML =
  `本终端已被访问 ${visitCount} 次` +
  (isReturn ? ` // 首次访问: ${new Date(localStorage.getItem(FIRST_VISIT_KEY)).toLocaleDateString('zh-CN')}` : '') +
  (visitCount >= 5 ? '<br><span style="color:var(--accent-red-bright)">⚠ 频繁访问已触发安全协议</span>' : '');

// --- Time-Sensitive Notices ---
function checkTimeNotice() {
  const now = new Date();
  const hour = now.getHours();
  const el = document.getElementById('timeNotice');

  if (hour >= 0 && hour < 5) {
    el.innerHTML = '⚠ 当前为非工作时段。您所看到的内容可能尚未经过审查。<br><span style="opacity:0.4">凌晨的信息最接近真相。</span>';
    el.classList.add('show');
  } else if (hour >= 23) {
    el.innerHTML = '系统维护即将开始。此时段产生的浏览记录将{{hidden:被特别标注}}正常保存。'.replace(/\{\{hidden:(.*?)\}\}/g, '<span class="hidden-text">$1</span>');
    el.classList.add('show');
  }
  // 你可以在这里添加更多时间段的特殊提示
}
checkTimeNotice();
</script>
