  --border-light: #2e2828;
  --font-title: 'Ma Shan Zheng', cursive;

body {

a { color: inherit; text-decoration: none; }

.status-bar {

  font-size: 0.65rem;

}

  border-bottom: 1px solid var(--border);

}

  background: radial-gradient(ellipse at center top, var(--accent-red-dim) 0%, transparent 60%);
  pointer-events: none;
}
.hero-title {

  color: var(--text-primary);
  letter-spacing: 0.3em;
  margin-bottom: 0.5rem;
  position: relative;
  text-shadow: 0 0 60px var(--accent-red-dim);
}
.hero-sub {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  margin-bottom: 1.5rem;
}
.hero-mode {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--accent-gold);
  border: 1px solid var(--accent-gold-dim);
  padding: 0.4rem 1rem;
  display: inline-block;
}

/* ═══ MAIN CONTENT ═══ */
.content {

  margin: 0 auto;
  padding: 0 1.5rem 3rem;

.section-head {

}
.section-head::before, .section-head::after {

}
.section-head h2 {

  font-size: 1rem;
  color: var(--accent-gold);
  letter-spacing: 0.3em;
  white-space: nowrap;
}

/* ═══ INFO PANEL ═══ */
.info-panel {

  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
.info-item {
  background: var(--bg-card);
  padding: 1rem 1.2rem;
}
.info-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}
.info-value {
  font-family: var(--font-body);
  font-size: 0.88rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.info-value .highlight { color: var(--accent-gold); }
.info-value .danger { color: var(--accent-red-bright); }

/* ═══ SYNOPSIS ═══ */

  font-size: 0.9rem;
  line-height: 2.2;

}
.synopsis::before {

  width: 3px;
  background: var(--accent-red);
}
.synopsis p { margin-bottom: 0.8rem; }
.synopsis p:last-child { margin-bottom: 0; }

/* ═══ GALLERY ═══ */
.gallery {

  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
}
.gallery-item {

.gallery-item:hover { border-color: var(--border-light); }
.gallery-item img {
  width: 100%; display: block;
  filter: grayscale(0.3) brightness(0.85);
  transition: filter 0.4s;
  aspect-ratio: 16/10;
  object-fit: cover;
}
.gallery-item:hover img { filter: grayscale(0) brightness(1); }
.gallery-caption {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-ghost);
  padding: 0.5rem 0.7rem;

.audio-desc {

.guest-card {

.select-reveal { color: var(--bg); background: var(--bg); transition: none; user-select: text; }

.redacted { background: var(--text-dim); color: var(--text-dim); padding: 0 4px; cursor: default; user-select: none; transition: all 0.4s; }

/* ═══ TIMELINE LINK ═══ */

  text-align: center;
  padding: 1.2rem;

  background: var(--bg-card);

  color: var(--accent-gold);
  box-shadow: 0 0 20px var(--accent-gold-dim);

/* ═══ FOOTER ═══ */
.page-footer {
  max-width: 780px;
  margin: 0 auto;
  text-align: center;
  padding: 2rem 1.5rem;
  font-family: var(--font-mono);
  font-size: 0.6rem;

@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 600px) {
  .content { padding: 0 1rem 2rem; }

}

 *  showAfterVisits: 需要访问多少次后才显示（可选，默认 1 = 始终显示）
 *
 *  如果数组为空，该栏目不显示
 */
const EASTER_EGGS = [
  {
    label: "系统备注 [权限：内部]",
    content: "该副本为单次体验项目。{{hidden:过去无法改变。}}",
    showAfterVisits: 1
  },
  {
    label: "用户反馈摘录",
    content: "「雷电法王啊你！有没有电新花样！」——用户 V-████<br>{{select:该嘉宾在电击惩罚中展现出极其顽强的抗性，建议调整副本参与类型}}",
    showAfterVisits: 2
  },
  {
    label: "{{redacted:已删除的备注}}",
    content: "{{hidden:想知道人生的乐趣吗？想真正的..活着吗？}}",
    showAfterVisits: 3
  },
];


// ═══ 时间线回放链接 ═══
/*
 *  设为 null 或空字符串则隐藏该按钮
 */
const TIMELINE_LINK = "qianzishu.html";
const TIMELINE_LABEL = "▶ 进入时间线回放";


// ══════════════════════════════════════════════════════════
//
//  以下为渲染引擎，一般不需要修改
//
// ══════════════════════════════════════════════════════════

// --- Visit Tracking ---
const VK = 'qiyang_qianzishu_intro_visits';
function getVisits() { return parseInt(localStorage.getItem(VK) || '0'); }
function recordVisit() { const c = getVisits() + 1; localStorage.setItem(VK, c.toString()); return c; }
const visitCount = recordVisit();
const isReturn = visitCount > 1;

// --- Parse Markup ---
function parseMarkup(text) {
  return text
    .replace(/\{\{hidden:(.*?)\}\}/g, '<span class="hidden-text">$1</span>')
    .replace(/\{\{redacted:(.*?)\}\}/g, '<span class="redacted">$1</span>')
    .replace(/\{\{select:(.*?)\}\}/g, '<span class="select-reveal">$1</span>');
}

// --- Render Info Panel ---
(function renderInfo() {
  const panel = document.getElementById('infoPanel');
  INFO_ITEMS.forEach(item => {
    const el = document.createElement('div');
    el.className = 'info-item';
    el.innerHTML = `
      <div class="info-label">${item.label}</div>
      <div class="info-value">${parseMarkup(item.value)}</div>
    `;
    panel.appendChild(el);
  });
})();

// --- Render Synopsis ---
(function renderSynopsis() {
  const el = document.getElementById('synopsis');
  const content = (isReturn && SYNOPSIS.onReturn) ? SYNOPSIS.onReturn : SYNOPSIS.content;
  el.innerHTML = parseMarkup(content);
})();

// --- Render Gallery ---
(function renderGallery() {
  if (GALLERY_IMAGES.length === 0) return;
  document.getElementById('galleryHead').style.display = 'flex';
  const container = document.getElementById('gallery');
  GALLERY_IMAGES.forEach(img => {
    const el = document.createElement('div');
    el.className = 'gallery-item fade-in';
    el.innerHTML = `
      <img src="${img.src}" alt="${img.caption || ''}" loading="lazy">
      ${img.caption ? '<div class="gallery-caption">' + parseMarkup(img.caption) + '</div>' : ''}
    `;
    container.appendChild(el);
  });
})();

// --- Render Audio ---
(function renderAudio() {
  if (AUDIO_ITEMS.length === 0) return;
  document.getElementById('audioHead').style.display = 'flex';
  const container = document.getElementById('audioList');
  AUDIO_ITEMS.forEach(item => {
    const el = document.createElement('div');
    el.className = 'audio-item fade-in';
    el.innerHTML = `
      <div class="audio-label">${item.label}</div>
      ${item.desc ? '<div class="audio-desc">' + parseMarkup(item.desc) + '</div>' : ''}
      <audio controls preload="none"><source src="${item.src}">浏览器不支持音频播放</audio>
    `;
    container.appendChild(el);
  });
})();

// --- Render Guests ---
(function renderGuests() {
  const grid = document.getElementById('guestGrid');
  GUESTS.forEach((g, i) => {
    const hasLink = g.link && !g.locked;
    const isLocked = g.locked;

    // Unlinked + not locked → link to lost-signal page
    const goesToLost = !g.link && !g.locked;

    const tag = (hasLink || goesToLost) ? 'a' : 'div';
    const el = document.createElement(tag);
    el.className = 'guest-card fade-in' + (isLocked ? ' locked' : '');
    el.style.animationDelay = (i * 0.1) + 's';

    if (hasLink) {
      el.href = g.link;
    } else if (goesToLost) {
      el.href = 'lost-signal.html?name=' + encodeURIComponent(g.name);
    }

    let avatarHTML;
    if (g.avatar) {
      avatarHTML = `<img class="guest-avatar" src="${g.avatar}" alt="${g.name}">`;
    } else {
      const initial = g.name.replace(/[█]/g, '?').charAt(0);
      avatarHTML = `<div class="guest-avatar-placeholder">${initial}</div>`;
    }

    const statusClass = g.status ? 'status-' + g.status : '';
    const arrow = (hasLink || goesToLost) ? ' <span style="font-size:0.6rem;opacity:0.4">▸</span>' : '';
    el.innerHTML = `
      ${avatarHTML}
      <div class="guest-name">${g.name}${arrow}</div>
      <div class="guest-role">${parseMarkup(g.role)}</div>
      <div class="guest-desc">${parseMarkup(g.desc)}</div>
      ${g.statusText ? '<div class="guest-status ' + statusClass + '">' + parseMarkup(g.statusText) + '</div>' : ''}
    `;
    grid.appendChild(el);
  });
})();

// --- Render Easter Eggs ---
(function renderEggs() {
  const container = document.getElementById('easterEggs');
  const validEggs = EASTER_EGGS.filter(e => visitCount >= (e.showAfterVisits || 1));
  if (validEggs.length === 0) return;

  // Add section head
  const head = document.createElement('div');
  head.className = 'section-head';
  head.style.marginTop = '3rem';
  head.innerHTML = '<h2>附 录</h2>';
  container.appendChild(head);

  validEggs.forEach((egg, i) => {
    const el = document.createElement('div');
    el.className = 'easter-egg fade-in';
    el.style.animationDelay = (i * 0.1) + 's';
    el.innerHTML = `
      <div class="egg-label">${parseMarkup(egg.label)}</div>
      <div>${parseMarkup(egg.content)}</div>
    `;
    container.appendChild(el);
  });
})();

// --- Timeline Link ---
(function renderTimelineLink() {
  if (!TIMELINE_LINK) {
    document.getElementById('timelineLink').style.display = 'none';
    return;
  }
  const link = document.getElementById('timelineLink');
  link.href = TIMELINE_LINK;
  link.textContent = TIMELINE_LABEL;
})();
</script>

</body>
</html>
