<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信号丢失</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Ma+Shan+Zheng&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080808;
  --accent-red: #8b0000;
  --accent-red-bright: #cc1111;
  --accent-red-dim: #8b000033;
  --text-primary: #ede7e0;
  --text-dim: #a89a8e;
  --text-ghost: #4a3e3e;
  --text-hidden: #080808;
  --border: #1e1a1a;
  --font-title: 'Ma Shan Zheng', cursive;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Noto Serif SC', serif;
}

html, body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-mono);
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Heavy static noise */
body::after {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  opacity: 0.06;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  animation: noiseShift 0.5s steps(3) infinite;
}
@keyframes noiseShift {
  0% { transform: translate(0, 0); }
  33% { transform: translate(-5%, -5%); }
  66% { transform: translate(3%, 2%); }
  100% { transform: translate(0, 0); }
}

/* Scan lines */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    #cc111106 3px, #cc111106 4px
  );
  pointer-events: none;
  z-index: 9999;
}

.container {
  text-align: center;
  position: relative;
  z-index: 10;
  max-width: 500px;
  padding: 2rem;
}

/* Corrupted icon */
.lost-icon {
  font-size: 4rem;
  opacity: 0.15;
  margin-bottom: 2rem;
  animation: iconFlicker 4s infinite;
}
@keyframes iconFlicker {
  0%, 88%, 100% { opacity: 0.15; }
  90% { opacity: 0.35; }
  92% { opacity: 0.05; }
  94% { opacity: 0.25; }
}

/* Main glitching text */
.lost-title {
  font-family: var(--font-title);
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  color: var(--text-primary);
  letter-spacing: 0.3em;
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeIn 1s ease-out 0.5s forwards;
}

.lost-message {
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 2.5;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeIn 0.8s ease-out 1.2s forwards;
}

.lost-code {
  font-size: 0.6rem;
  color: var(--text-ghost);
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeIn 0.8s ease-out 1.8s forwards;
  line-height: 2;
}
.lost-code .blink {
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

/* Hidden text */
.hidden-text {
  color: var(--text-hidden);
  background: transparent;
  transition: all 0.6s ease;
  position: relative;
  cursor: default;
  padding: 0 2px;
}
.hidden-text::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: var(--accent-red);
  opacity: 0;
  transition: opacity 0.6s;
}
.hidden-text:hover {
  color: var(--accent-red-bright) !important;
  text-shadow: 0 0 20px var(--accent-red-dim);
}
.hidden-text:hover::after { opacity: 0.5; }

/* Back button */
.back-btn {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-ghost);
  border: 1px solid var(--border);
  padding: 0.4rem 1rem;
  text-decoration: none;
  transition: all 0.3s;
  opacity: 0;
  animation: fadeIn 0.8s ease-out 2.5s forwards;
}
.back-btn:hover {
  color: var(--text-dim);
  border-color: var(--text-dim);
}

/* Periodic screen glitch */
.container.glitch-active {
  animation: screenGlitch 0.15s;
}
@keyframes screenGlitch {
  0% { transform: translate(0); filter: none; }
  20% { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
  40% { transform: translate(2px, -1px); filter: hue-rotate(-45deg) brightness(1.3); }
  60% { transform: translate(-1px, 2px); filter: hue-rotate(45deg); }
  80% { transform: translate(1px, -1px); filter: none; }
  100% { transform: translate(0); filter: none; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="container" id="container">

  <div class="lost-icon">◌</div>

  <div class="lost-title">信 号 丢 失</div>

  <div class="lost-message">
    无法加载该参与者的录播数据。<br>
    可能原因：数据未同步 / 权限不足 / <span class="hidden-text">该记录已被人为删除</span>
  </div>

  <div class="lost-code">
    ERR_SIGNAL_LOST // TARGET: <span id="targetName">UNKNOWN</span><br>
    RETRY: 0/3 — STATUS: <span style="color:var(--accent-red-bright)">FAILED</span><span class="blink">_</span><br>
    <span class="hidden-text">也许她不想被找到。</span>
  </div>

  <a href="javascript:history.back()" class="back-btn" id="backBtn">← 返回</a>

</div>

<script>
// ══════════════════════════════════════════════════════════
//
//  ██  损 坏 页 配 置  ██
//
// ══════════════════════════════════════════════════════════

/*
 *  这个页面不需要每个嘉宾单独复制。
 *  从副本简介页（intro）的嘉宾卡片跳转过来时，
 *  可以通过 URL 参数 ?name=XXX 传递嘉宾名字。
 *
 *  例如: lost-signal.html?name=参与者C
 *  页面会自动将名字显示在错误信息中。
 *
 *  FALLBACK_LINK: 返回按钮的备用链接（如果 history.back 不可用）
 */
const FALLBACK_LINK = "qianzishu-intro.html";


// ══════════════════════════════════════════════════════════
//  以下为渲染引擎
// ══════════════════════════════════════════════════════════

// Read name from URL params
const params = new URLSearchParams(window.location.search);
const guestName = params.get('name');
if (guestName) {
  document.getElementById('targetName').textContent = guestName;
}

// Set fallback for back button if no history
if (window.history.length <= 1) {
  document.getElementById('backBtn').href = FALLBACK_LINK;
}

// Periodic random glitch
setInterval(() => {
  if (Math.random() < 0.15) {
    const el = document.getElementById('container');
    el.classList.add('glitch-active');
    setTimeout(() => el.classList.remove('glitch-active'), 150);
  }
}, 3000);
</script>

</body>
</html>
