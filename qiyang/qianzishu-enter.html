<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接入中... | 副本 #5732</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Ma+Shan+Zheng&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080808;
  --accent-red: #8b0000;
  --accent-red-bright: #cc1111;
  --accent-red-dim: #8b000033;
  --accent-gold: #c4a35a;
  --accent-gold-dim: #c4a35a44;
  --text-primary: #ede7e0;
  --text-dim: #a89a8e;
  --text-ghost: #4a3e3e;
  --font-title: 'Ma Shan Zheng', cursive;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Noto Serif SC', serif;
}

html, body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-mono);
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: none;
}

/* Scan lines */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    #cc111103 2px, #cc111103 4px
  );
  pointer-events: none;
  z-index: 9999;
  animation: scanDrift 10s linear infinite;
}
@keyframes scanDrift {
  from { background-position: 0 0; }
  to { background-position: 0 100vh; }
}

/* Noise */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

/* ═══ MAIN CONTAINER ═══ */
.enter-screen {
  text-align: center;
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 600px;
  padding: 2rem;
}

/* ═══ PHASE BLOCKS ═══ */
.phase {
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 1.5rem;
}
.phase.active {
  opacity: 1;
  transform: translateY(0);
}
.phase.fade-out {
  opacity: 0;
  transform: translateY(-8px);
}

/* ═══ ELEMENTS ═══ */
.enter-id {
  font-size: 0.6rem;
  color: var(--text-ghost);
  letter-spacing: 0.2em;
  margin-bottom: 2rem;
}

.enter-title {
  font-family: var(--font-title);
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  color: var(--text-primary);
  letter-spacing: 0.3em;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.enter-title.visible { opacity: 1; }
.enter-title.glitch {
  animation: titleGlitch 0.15s infinite;
}
@keyframes titleGlitch {
  0% { text-shadow: 2px 0 var(--accent-red-bright), -2px 0 #00f0ff; }
  25% { text-shadow: -2px 0 var(--accent-red-bright), 2px 0 #00f0ff; }
  50% { text-shadow: 2px 2px var(--accent-red-bright), -2px -2px #00f0ff; }
  75% { text-shadow: -1px -1px var(--accent-red-bright), 1px 1px #00f0ff; }
  100% { text-shadow: 1px 0 var(--accent-red-bright), -1px 0 #00f0ff; }
}

.log-line {
  font-size: 0.7rem;
  color: var(--text-dim);
  line-height: 2.2;
  text-align: left;
  max-width: 420px;
  margin: 0 auto;
}
.log-line .line {
  opacity: 0;
  transition: opacity 0.4s ease;
}
.log-line .line.show { opacity: 1; }
.log-line .ok { color: var(--accent-gold); }
.log-line .fail { color: var(--accent-red-bright); }
.log-line .warn { color: var(--accent-red-bright); opacity: 0.7; }

.progress-bar {
  width: 100%;
  max-width: 300px;
  height: 2px;
  background: var(--text-ghost);
  margin: 1.5rem auto;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.4s;
}
.progress-bar.show { opacity: 1; }
.progress-bar .fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: var(--accent-gold);
  transition: width 0.3s ease;
}
.progress-bar.error .fill { background: var(--accent-red-bright); }

.status-text {
  font-size: 0.65rem;
  color: var(--text-ghost);
  margin-top: 0.5rem;
  min-height: 1.5em;
}

/* Permission denied flash */
.deny-flash {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--accent-red);
  z-index: 9998;
  pointer-events: none;
  opacity: 0;
}
.deny-flash.fire {
  animation: denyPulse 0.5s ease-out;
}
@keyframes denyPulse {
  0% { opacity: 0.3; }
  100% { opacity: 0; }
}

/* Dimensional reduction message */
.dim-reduce {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 2.2;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.dim-reduce.visible { opacity: 1; }
.dim-reduce .highlight { color: var(--accent-gold); }
.dim-reduce .red { color: var(--accent-red-bright); }

/* Final redirect */
.redirect-msg {
  font-size: 0.6rem;
  color: var(--text-ghost);
  opacity: 0;
  transition: opacity 0.5s;
}
.redirect-msg.visible { opacity: 1; }

/* Screen shake */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
  20%, 40%, 60%, 80% { transform: translateX(3px); }
}
.shake { animation: shake 0.4s ease-out; }

/* Fade to black at end */
.black-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  z-index: 9997;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
.black-overlay.active { opacity: 1; }
</style>
</head>
<body>

<div class="deny-flash" id="denyFlash"></div>
<div class="black-overlay" id="blackOverlay"></div>

<div class="enter-screen" id="screen">

  <div class="enter-id" id="enterId">INSTANCE #5732 // 千子树下</div>

  <div class="enter-title" id="enterTitle">千子树下</div>

  <!-- Phase 1: Connection log -->
  <div class="phase" id="phase1">
    <div class="log-line" id="logLines"></div>
    <div class="progress-bar" id="progressBar">
      <div class="fill" id="progressFill"></div>
    </div>
    <div class="status-text" id="statusText"></div>
  </div>

  <!-- Phase 2: Dimensional reduction -->
  <div class="phase" id="phase2">
    <div class="dim-reduce" id="dimReduce"></div>
  </div>

  <!-- Phase 3: Redirect -->
  <div class="phase" id="phase3">
    <div class="redirect-msg" id="redirectMsg">正在跳转至副本简介...</div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════
//
//  ██  过 场 动 画 配 置  ██
//
//  修改以下数据即可定制过场内容，不需要改其他代码
//
// ══════════════════════════════════════════════════════════

/*
 * REDIRECT_TARGET: 过场结束后跳转的页面地址
 */
const REDIRECT_TARGET = "qianzishu-intro.html";

/*
 * PHASE1_LINES: 连接阶段的日志行
 *
 *  text:    显示文字（支持 HTML）
 *  delay:   该行出现前的等待时间（毫秒，相对于上一行结束）
 *  progress: 进度条走到的百分比（0-100）
 *  status:  底部状态栏文字（可选）
 *
 *  在最后一行之后，系统会自动模拟"权限校验失败"
 */
const PHASE1_LINES = [
  { text: '正在连接至祈殃娱乐中继节点...', delay: 0, progress: 5, status: '连接中...' },
  { text: '节点 QY-NODE-17 <span class="ok">已响应</span>', delay: 600, progress: 15 },
  { text: '加载副本 #5732 回放数据...', delay: 400, progress: 25, status: '加载副本数据...' },
  { text: '音频轨道 <span class="ok">OK</span> // 视觉轨道 <span class="ok">OK</span>', delay: 500, progress: 40 },
  { text: '同步时间线标记...', delay: 300, progress: 55, status: '同步时间线...' },
  { text: '校验用户权限...', delay: 500, progress: 70, status: '校验权限...' },
  { text: '权限等级：<span class="fail">不足</span>', delay: 800, progress: 70 },
  { text: '<span class="fail">⚠ 完整回放权限被拒绝</span>', delay: 400, progress: 70, status: '权限校验失败' },
  { text: '尝试降维接入...', delay: 600, progress: 80, status: '降维处理中...' },
  { text: '降维至文字转播模式 <span class="ok">成功</span>', delay: 700, progress: 100, status: '降维完成' },
];

/*
 * PHASE2_TEXT: 降维提示的文字内容（支持 HTML）
 *  显示在权限失败后、跳转前
 */
const PHASE2_TEXT = `
  <span class="red">⚠ 您的权限不足以访问完整回放。</span><br><br>
  系统已自动将内容降维至<span class="highlight">「文字转播」</span>模式。<br>
  部分画面、音频及交互内容将以文字描述替代。<br><br>
  <span style="font-size:0.7rem;color:#4a3e3e">请注意：降维过程中可能丢失关键信息。本系统不对信息完整性负责。</span>
`;

/*
 * TIMINGS: 各阶段的时间控制（毫秒）
 */
const TIMINGS = {
  titleAppear: 300,         // 标题淡入
  phase1Start: 1200,        // 日志开始
  denyFlashDelay: 400,      // 权限失败后红色闪屏延迟（相对于phase1结束）
  phase2Delay: 1200,        // 降维提示出现延迟（相对于phase1结束）
  phase2Duration: 3000,     // 降维提示显示时长
  redirectDelay: 800,       // 跳转提示出现延迟（相对于phase2结束）
  actualRedirect: 1500,     // 实际跳转延迟（相对于跳转提示出现）
};


// ══════════════════════════════════════════════════════════
//
//  以下为动画引擎，一般不需要修改
//
// ══════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runPhase1() {
  const phase = $('phase1');
  const logContainer = $('logLines');
  const bar = $('progressBar');
  const fill = $('progressFill');
  const status = $('statusText');

  phase.classList.add('active');
  bar.classList.add('show');

  for (const line of PHASE1_LINES) {
    await sleep(line.delay);

    const el = document.createElement('div');
    el.className = 'line';
    el.innerHTML = '> ' + line.text;
    logContainer.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));

    if (line.progress !== undefined) {
      fill.style.width = line.progress + '%';
    }
    if (line.status) {
      status.textContent = line.status;
    }

    // Check if this is the fail line — shake + flash
    if (line.text.includes('被拒绝')) {
      await sleep(TIMINGS.denyFlashDelay);
      $('denyFlash').classList.add('fire');
      $('screen').classList.add('shake');
      bar.classList.add('error');
      setTimeout(() => $('screen').classList.remove('shake'), 400);
      setTimeout(() => $('denyFlash').classList.remove('fire'), 500);
    }
  }
}

async function runPhase2() {
  $('phase1').classList.add('fade-out');
  await sleep(400);
  $('phase1').classList.remove('active');

  const phase = $('phase2');
  phase.classList.add('active');

  const dim = $('dimReduce');
  dim.innerHTML = PHASE2_TEXT;
  await sleep(200);
  dim.classList.add('visible');

  // Glitch the title briefly
  $('enterTitle').classList.add('glitch');
  await sleep(600);
  $('enterTitle').classList.remove('glitch');
}

async function runPhase3() {
  $('phase2').classList.add('fade-out');
  await sleep(400);

  const phase = $('phase3');
  phase.classList.add('active');
  const msg = $('redirectMsg');
  await sleep(200);
  msg.classList.add('visible');

  await sleep(TIMINGS.actualRedirect);

  // Fade to black then redirect
  $('blackOverlay').classList.add('active');
  await sleep(800);
  window.location.href = REDIRECT_TARGET;
}

async function main() {
  await sleep(TIMINGS.titleAppear);
  $('enterTitle').classList.add('visible');

  await sleep(TIMINGS.phase1Start);
  await runPhase1();

  await sleep(TIMINGS.phase2Delay);
  await runPhase2();

  await sleep(TIMINGS.phase2Duration);

  await sleep(TIMINGS.redirectDelay);
  await runPhase3();
}

main();
</script>

</body>
</html>
